<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新莊國小 QRcode 專業排版產生器</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; }
        input[type="color"] {
            -webkit-appearance: none; border: none; width: 100%; height: 40px;
            padding: 0; border-radius: 8px; cursor: pointer; overflow: hidden;
        }
        input[type="range"] { cursor: pointer; }
        /* 讓預覽區域可以捲動，避免畫布太大擋住介面 */
        #preview-scroll-area {
            max-height: 500px;
            overflow: auto;
            border: 2px dashed #cbd5e1;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4">

    <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-6">
        
        <div class="w-full lg:w-96 space-y-4 bg-white p-6 rounded-2xl shadow-lg border border-slate-200">
             <div class="border-b pb-2">
                <h1 class="text-xl font-black text-blue-900">新莊國小 QRcode</h1>
                <p class="text-xs text-slate-500 font-bold">進階排版模式</p>
             </div>
            
            <div class="space-y-3">
                <label class="block text-sm font-bold text-gray-700">1. 內容設定</label>
                <div class="flex gap-2">
                    <input type="text" id="url-input" value="https://www.sjps.kh.edu.tw/" class="auto-update flex-1 px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="shortenURL()" id="short-btn" class="px-2 py-1 bg-indigo-600 text-white text-xs rounded-lg hover:bg-indigo-700 transition">縮址</button>
                </div>
                <input type="text" id="title-input" value="新莊國小" class="auto-update w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="space-y-3 p-3 bg-blue-50 rounded-xl border border-blue-100">
                <label class="block text-xs font-black text-blue-800 uppercase">標題文字排版</label>
                <div class="flex items-center justify-between">
                    <span class="text-xs font-bold text-slate-600">字體大小</span>
                    <div class="flex items-center gap-1">
                        <button onclick="adjustValue('title-size', -2)" class="w-8 h-8 bg-white border border-slate-300 rounded shadow-sm hover:bg-gray-100 font-bold">-</button>
                        <input type="number" id="title-size" value="28" class="auto-update w-12 text-center bg-transparent font-bold">
                        <button onclick="adjustValue('title-size', 2)" class="w-8 h-8 bg-white border border-slate-300 rounded shadow-sm hover:bg-gray-100 font-bold">+</button>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between mb-1 text-xs font-bold text-slate-600">
                        <span>文字與 QR 距離</span>
                        <span id="title-margin-val">10</span>
                    </div>
                    <input type="range" id="title-margin" min="0" max="100" value="10" class="auto-update w-full accent-blue-600">
                </div>
            </div>

            <div class="space-y-3 p-3 bg-slate-50 rounded-xl border border-slate-200 text-xs">
                <label class="block font-black text-slate-700 uppercase">畫布邊框 (Padding)</label>
                <div class="grid grid-cols-2 gap-x-4 gap-y-2">
                    <div>
                        <span class="text-slate-500">上邊距</span>
                        <input type="range" id="pad-top" min="0" max="100" value="30" class="auto-update w-full">
                    </div>
                    <div>
                        <span class="text-slate-500">下邊距</span>
                        <input type="range" id="pad-bottom" min="0" max="100" value="30" class="auto-update w-full">
                    </div>
                    <div>
                        <span class="text-slate-500">左邊距</span>
                        <input type="range" id="pad-left" min="0" max="100" value="30" class="auto-update w-full">
                    </div>
                    <div>
                        <span class="text-slate-500">右邊距</span>
                        <input type="range" id="pad-right" min="0" max="100" value="30" class="auto-update w-full">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <select id="shape-style" class="auto-update px-2 py-2 border rounded-lg text-xs font-bold">
                    <option value="square">標準方形</option>
                    <option value="rounded">圓角方塊</option>
                    <option value="dots">圓點風格</option>
                </select>
                <select id="text-position" class="auto-update px-2 py-2 border rounded-lg text-xs font-bold">
                    <option value="top">標題在上方</option>
                    <option value="bottom" selected>標題在下方</option>
                    <option value="middle">標題在中間</option>
                </select>
                <div class="flex items-center gap-2">
                    <input type="color" id="fg-color" value="#000000" class="auto-update">
                    <span class="text-[10px] font-bold">QR色</span>
                </div>
                <div class="flex items-center gap-2">
                    <input type="color" id="text-color" value="#000000" class="auto-update">
                    <span class="text-[10px] font-bold">文字色</span>
                </div>
            </div>

            <button onclick="downloadQR()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-blue-700 active:scale-95 transition-all">
                下載這張圖片
            </button>
        </div>

        <div class="flex-1 flex flex-col">
            <div class="mb-2 flex justify-between items-end">
                <span class="text-sm font-bold text-slate-500">實時預覽 (與下載結果完全一致)</span>
                <span id="canvas-dim" class="text-xs bg-slate-200 px-2 py-1 rounded font-mono">0 x 0 px</span>
            </div>
            <div id="preview-scroll-area" class="flex-1 flex items-center justify-center p-10 rounded-2xl">
                <div class="bg-white shadow-2xl">
                    <canvas id="final-canvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化 QR Code Styling (固定 300px)
        const QR_SIZE = 300;
        let qrCodeStyling = new QRCodeStyling({
            width: QR_SIZE, height: QR_SIZE, type: "canvas",
            qrOptions: { errorCorrectionLevel: 'H' }
        });

        function adjustValue(id, amount) {
            const input = document.getElementById(id);
            input.value = parseInt(input.value) + amount;
            generateQR();
        }

        document.querySelectorAll('.auto-update').forEach(el => {
            el.addEventListener('input', () => {
                if(el.id === 'title-margin') document.getElementById('title-margin-val').innerText = el.value;
                generateQR();
            });
        });

        window.onload = () => { generateQR(); }

        async function shortenURL() {
            const urlInput = document.getElementById('url-input');
            const btn = document.getElementById('short-btn');
            try {
                btn.innerText = "...";
                const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(urlInput.value)}`);
                if (response.ok) { urlInput.value = await response.text(); generateQR(); }
            } finally { btn.innerText = "縮址"; }
        }

        async function generateQR() {
            const url = document.getElementById('url-input').value || " ";
            const title = document.getElementById('title-input').value;
            const position = document.getElementById('text-position').value;
            const shapeStyle = document.getElementById('shape-style').value;
            const fgColor = document.getElementById('fg-color').value;
            const textColor = document.getElementById('text-color').value;
            
            // 排版數據
            const titleSize = parseInt(document.getElementById('title-size').value);
            const titleMargin = parseInt(document.getElementById('title-margin').value);
            const pTop = parseInt(document.getElementById('pad-top').value);
            const pBottom = parseInt(document.getElementById('pad-bottom').value);
            const pLeft = parseInt(document.getElementById('pad-left').value);
            const pRight = parseInt(document.getElementById('pad-right').value);

            const finalCanvas = document.getElementById('final-canvas');
            const ctx = finalCanvas.getContext('2d');

            // 1. 更新 QR Code
            let dt = 'square', cs = 'square', cd = 'square';
            if (shapeStyle === 'rounded') { dt = 'rounded'; cs = 'extra-rounded'; cd = 'dot'; }
            else if (shapeStyle === 'dots') { dt = 'dots'; cs = 'extra-rounded'; cd = 'dot'; }
            qrCodeStyling.update({
                data: url,
                dotsOptions: { color: fgColor, type: dt },
                backgroundOptions: { color: "#ffffff00" }, // 透明背景讓畫布控制
                cornersSquareOptions: { color: fgColor, type: cs },
                cornersDotOptions: { color: fgColor, type: cd }
            });

            // 2. 計算畫布尺寸
            // 文字所佔的垂直高度
            const textBlockHeight = (position === 'middle') ? 0 : (titleSize + titleMargin);
            finalCanvas.width = QR_SIZE + pLeft + pRight;
            finalCanvas.height = QR_SIZE + pTop + pBottom + textBlockHeight;

            // 更新顯示尺寸
            document.getElementById('canvas-dim').innerText = `${finalCanvas.width} x ${finalCanvas.height} px`;

            // 3. 繪製
            const qrBlob = await qrCodeStyling.getRawData('png');
            const qrImg = new Image();
            qrImg.src = URL.createObjectURL(qrBlob);

            qrImg.onload = () => {
                // 背景
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

                // 計算位置
                let qrX = pLeft;
                let qrY = (position === 'top') ? (pTop + textBlockHeight) : pTop;
                ctx.drawImage(qrImg, qrX, qrY, QR_SIZE, QR_SIZE);

                // 文字
                if (title) {
                    ctx.fillStyle = textColor;
                    ctx.font = `bold ${titleSize}px 'Microsoft JhengHei', Arial`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";

                    let tx = finalCanvas.width / 2;
                    let ty;
                    if (position === 'top') {
                        ty = pTop + (titleSize / 2);
                    } else if (position === 'bottom') {
                        ty = finalCanvas.height - pBottom - (titleSize / 2);
                    } else { // middle
                        ty = pTop + (QR_SIZE / 2);
                        const textWidth = ctx.measureText(title).width + 20;
                        ctx.fillStyle = "#ffffff";
                        ctx.fillRect(tx - textWidth / 2, ty - titleSize / 2 - 5, textWidth, titleSize + 10);
                        ctx.fillStyle = textColor;
                    }
                    ctx.fillText(title, tx, ty);
                }
                URL.revokeObjectURL(qrImg.src);
            };
        }

        function downloadQR() {
            const canvas = document.getElementById('final-canvas');
            const link = document.createElement('a');
            link.download = `SJPS-QR-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
